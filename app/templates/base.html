<!DOCTYPE html>
<html lang="pt-BR" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}OxePass — Gerador de Senhas{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"JetBrains Mono"', '"Fira Code"', 'ui-monospace', 'monospace'],
            sans: ['"Inter"', 'ui-sans-serif', 'system-ui'],
          },
          colors: {
            brand: {
              50: '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.35s ease-out',
            'slide-up': 'slideUp 0.35s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(14px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        },
      },
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet" />

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  <style>
    /* ── Range slider ── */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 9999px;
      background: linear-gradient(to right,
          #6366f1 0%, #6366f1 var(--range-pct, 50%),
          #e0e7ff var(--range-pct, 50%), #e0e7ff 100%);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 3px solid #6366f1;
      box-shadow: 0 1px 4px rgba(99, 102, 241, 0.35);
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px rgba(99, 102, 241, 0.15), 0 1px 4px rgba(99, 102, 241, 0.3);
      transform: scale(1.1);
    }

    input[type=range]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 3px solid #6366f1;
      box-shadow: 0 1px 4px rgba(99, 102, 241, 0.3);
      cursor: pointer;
    }

    /* ── Card base ── */
    .card {
      background: white;
      border: 1px solid #e8e6f8;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.07), 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .card-lg {
      box-shadow: 0 8px 40px rgba(99, 102, 241, 0.10), 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    /* ── Toggle card ── */
    .toggle-card {
      transition: all 0.18s ease;
    }

    .toggle-card.active {
      border-color: #6366f1;
      background: #eef2ff;
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.25);
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body class="min-h-full bg-[#f4f3ff] text-slate-800 font-sans antialiased selection:bg-brand-200">

  <!-- Faint blobs -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-60 -left-60 w-[700px] h-[700px] rounded-full bg-indigo-200/40 blur-[140px]"></div>
    <div class="absolute -bottom-60 -right-60 w-[700px] h-[700px] rounded-full bg-violet-200/40 blur-[140px]"></div>
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[900px] h-[500px] rounded-full bg-indigo-100/30 blur-[100px]">
    </div>
  </div>

  <!-- Header -->
  <header
    class="py-4 px-4 sm:px-8 flex items-center justify-between bg-white/70 backdrop-blur border-b border-indigo-100 sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <div
        class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-md shadow-indigo-300/40">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
      </div>
      <span class="text-lg font-semibold tracking-tight text-slate-800">Oxe<span
          class="text-indigo-600">Pass</span></span>
    </div>
    <span class="text-xs text-slate-400 font-mono">v1.0.0</span>
  </header>

  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <footer class="py-6 text-center text-xs text-slate-400 border-t border-indigo-100 mt-12">
    Gerado localmente &mdash; suas senhas nunca saem do servidor.
  </footer>

  <script>
    function downloadPasswords() {
      const btns = document.querySelectorAll('#password-list [data-password]');
      if (!btns.length) return;
      const lines = [...btns].map(b => b.dataset.password);
      const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), { href: url, download: 'senhas.txt' });
      a.click();
      URL.revokeObjectURL(url);
    }

    function copyPassword(btn) {
      const text = btn.dataset.password;
      navigator.clipboard.writeText(text).then(() => {
        // swap icons
        btn.querySelector('.icon-copy').classList.add('hidden');
        btn.querySelector('.icon-check').classList.remove('hidden');
        // swap button color
        btn.classList.remove('bg-indigo-100', 'text-indigo-600', 'hover:bg-indigo-200', 'border-indigo-200');
        btn.classList.add('bg-emerald-100', 'text-emerald-600', 'border-emerald-200');
        // show feedback text
        const fb = document.getElementById('copy-feedback');
        if (fb) fb.classList.remove('hidden');

        setTimeout(() => {
          btn.querySelector('.icon-copy').classList.remove('hidden');
          btn.querySelector('.icon-check').classList.add('hidden');
          btn.classList.add('bg-indigo-100', 'text-indigo-600', 'hover:bg-indigo-200', 'border-indigo-200');
          btn.classList.remove('bg-emerald-100', 'text-emerald-600', 'border-emerald-200');
          if (fb) fb.classList.add('hidden');
        }, 2000);
      });
    }
  </script>

  {% block scripts %}{% endblock %}
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}OxePass — Gerador de Senhas Seguras{% endblock %}</title>

  <!-- SEO -->
  <meta name="description" content="Gerador de senhas seguras online e gratuito. Crie senhas fortes, memoráveis, para Wi-Fi, PIN, API e muito mais. Suas senhas são geradas localmente e nunca saem do servidor." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://oxepass.com/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://oxepass.com/" />
  <meta property="og:title" content="OxePass — Gerador de Senhas Seguras" />
  <meta property="og:description" content="Gere senhas fortes e seguras gratuitamente. Perfis para Wi-Fi, PIN, corporativo, memorizável e muito mais." />
  <meta property="og:locale" content="pt_BR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="OxePass — Gerador de Senhas Seguras" />
  <meta name="twitter:description" content="Gere senhas fortes e seguras gratuitamente. Suas senhas nunca saem do servidor." />

  <!-- Tailwind CSS (build estático) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet" />

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  {% block extra_head %}{% endblock %}
</head>

<body class="min-h-full bg-[#f4f3ff] text-slate-800 font-sans antialiased selection:bg-brand-200">

  <!-- Faint blobs -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-60 -left-60 w-[700px] h-[700px] rounded-full bg-indigo-200/40 blur-[140px]"></div>
    <div class="absolute -bottom-60 -right-60 w-[700px] h-[700px] rounded-full bg-violet-200/40 blur-[140px]"></div>
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[900px] h-[500px] rounded-full bg-indigo-100/30 blur-[100px]">
    </div>
  </div>

  <!-- Header -->
  <header
    class="py-4 px-4 sm:px-8 flex items-center justify-between bg-white/70 backdrop-blur border-b border-indigo-100 sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <div
        class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-md shadow-indigo-300/40">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
      </div>
      <span class="text-lg font-semibold tracking-tight text-slate-800">Oxe<span
          class="text-indigo-600">Pass</span></span>
    </div>
    <span class="text-xs text-slate-400 font-mono">v1.0.0</span>
  </header>

  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <footer class="py-6 text-center text-xs text-slate-400 border-t border-indigo-100 mt-12 space-y-2">
    <p>Gerado localmente &mdash; suas senhas nunca saem do servidor.</p>
    <p class="flex items-center justify-center gap-4">
      <a href="/privacidade" class="hover:text-indigo-500 transition-colors">Política de Privacidade</a>
      <span class="text-slate-200">|</span>
      <a href="/termos" class="hover:text-indigo-500 transition-colors">Termos de Uso</a>
    </p>
  </footer>

  <script>
    function downloadPasswords() {
      const btns = document.querySelectorAll('#password-list [data-password]');
      if (!btns.length) return;
      const lines = [...btns].map(b => b.dataset.password);
      const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), { href: url, download: 'senhas.txt' });
      a.click();
      URL.revokeObjectURL(url);
    }

    function copyPassword(btn) {
      const text = btn.dataset.password;
      navigator.clipboard.writeText(text).then(() => {
        btn.querySelector('.icon-copy').classList.add('hidden');
        btn.querySelector('.icon-check').classList.remove('hidden');
        btn.classList.remove('bg-indigo-100', 'text-indigo-600', 'hover:bg-indigo-200', 'border-indigo-200');
        btn.classList.add('bg-emerald-100', 'text-emerald-600', 'border-emerald-200');
        const fb = document.getElementById('copy-feedback');
        if (fb) fb.classList.remove('hidden');

        setTimeout(() => {
          btn.querySelector('.icon-copy').classList.remove('hidden');
          btn.querySelector('.icon-check').classList.add('hidden');
          btn.classList.add('bg-indigo-100', 'text-indigo-600', 'hover:bg-indigo-200', 'border-indigo-200');
          btn.classList.remove('bg-emerald-100', 'text-emerald-600', 'border-emerald-200');
          if (fb) fb.classList.add('hidden');
        }, 2000);
      });
    }
  </script>

  {% block scripts %}{% endblock %}
</body>

</html>
